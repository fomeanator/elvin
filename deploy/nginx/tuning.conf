# LVN nginx tuning (http context) — sized for a small VPS (1-2 vCPU) in
# front of the Go content server. Installed to /etc/nginx/conf.d/ by setup.sh.
#
# Only directives the distro's nginx.conf does NOT already set (Debian ships
# gzip on / sendfile on / tcp_nopush / keepalive_timeout in http{} — declaring
# those twice is a hard config error, not an override).

# Compress the chatty payloads: scripts (.lvn json), manifests, catalogs.
# Art (png/jpg/ktx2/ogg) is already compressed — gzip would waste the core.
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types application/json text/plain text/css application/javascript
           application/wasm image/svg+xml;

# Descriptor cache: the same art files are requested by every player.
open_file_cache max=2000 inactive=60s;
open_file_cache_valid 120s;
open_file_cache_min_uses 1;

# Micro-cache for proxied content: a burst of players fetching the same
# chapter art is served from nginx without touching the Go process. Short
# TTL (5m in the site config) so a partner's re-import propagates quickly.
proxy_cache_path /var/cache/nginx/lvn levels=1:2 keys_zone=lvn_content:32m
                 max_size=1g inactive=7d use_temp_path=off;
