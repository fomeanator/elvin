# The invariant net: everything the repo asserts about itself, run on every
# push/PR instead of on somebody's machine.
#
#   go     — server + lvnconv (importer/validator/adpd) tests, vet, gofmt.
#            The importer e2e over real articy projects is env-gated
#            (ARTICY_PROJECTS) and self-skips here — those projects are private.
#   smoke  — lvnconv end-to-end on the committed example (convert → validate).
#   lang   — the LVNScript grammar contract: lvn-lang tests (incl. the
#            grammar.json ↔ grammar.js parity guard) + a regen-diff check so a
#            hand-edited generated file fails loudly.
#   panel  — the authoring panel builds (catches broken imports/aliases).
#   unity  — the engine package's 300+ EditMode tests + the PlayMode smoke via
#            game-ci, using the committed unity/TestHost project. Needs either
#            the UNITY_EMAIL + UNITY_PASSWORD secrets (Personal license — Unity
#            dropped manual .ulf activation for it) or a UNITY_LICENSE .ulf
#            (Pro). Without credentials the job emits a notice and passes, so
#            forks stay green until configured.
name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:

# Each Go module is built and tested standalone (GOWORK=off), the way a
# consumer would `go install` it — the repo's go.work is a local convenience,
# not part of the contract.
env:
  GOWORK: "off"

jobs:
  go:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [tools/lvnconv, server]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  smoke:
    name: lvnconv end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/lvnconv/go.mod
          cache-dependency-path: tools/lvnconv/go.sum
      - name: convert + validate the example
        working-directory: tools/lvnconv
        run: |
          go run . convert -i ../../examples/hello.ink -o /tmp/hello.lvn
          go run . validate /tmp/hello.lvn
          go run . probe /tmp/hello.lvn

  lang:
    name: LVNScript grammar contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: grammar + analysis tests
        working-directory: tools/lvn-lang
        run: node --test
      - name: generated grammar.js is in sync
        working-directory: tools/lvn-lang
        run: |
          node scripts/gen.mjs
          git diff --exit-code src/grammar.js \
            || { echo "::error::grammar.js is stale — run 'npm run gen' in tools/lvn-lang and commit"; exit 1; }

  panel:
    name: authoring panel builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: panel/package-lock.json
      - name: build
        working-directory: panel
        run: |
          npm ci
          npm run build

  unity:
    name: engine tests (EditMode + PlayMode)
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
    steps:
      - name: check license secret
        id: lic
        run: |
          if [ -n "$UNITY_LICENSE" ] || { [ -n "$UNITY_EMAIL" ] && [ -n "$UNITY_PASSWORD" ]; }; then
            echo "has=true" >> "$GITHUB_OUTPUT"
          else
            echo "has=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Unity credentials — skipping the engine tests. Add UNITY_EMAIL + UNITY_PASSWORD repo secrets (Personal license; manual .ulf activation is discontinued) or a UNITY_LICENSE .ulf (Pro) to enable them."
          fi
      - uses: actions/checkout@v4
        if: steps.lic.outputs.has == 'true'
      - uses: actions/cache@v4
        if: steps.lic.outputs.has == 'true'
        with:
          path: unity/TestHost/Library
          key: testhost-library-${{ hashFiles('unity/Packages/com.lvn.engine/package.json', 'unity/TestHost/Packages/manifest.json') }}
          restore-keys: testhost-library-
      - name: run tests
        if: steps.lic.outputs.has == 'true'
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: unity/TestHost
          testMode: All
          artifactsPath: test-results
      - uses: actions/upload-artifact@v4
        if: always() && steps.lic.outputs.has == 'true'
        with:
          name: unity-test-results
          path: test-results
