# The invariant net: everything the repo asserts about itself, run on every
# push/PR instead of on somebody's machine.
#
#   go     — server + lvnconv (importer/validator/adpd) tests, vet, gofmt.
#            The importer e2e over real articy projects is env-gated
#            (ARTICY_PROJECTS) and self-skips here — those projects are private.
#   smoke  — lvnconv end-to-end on the committed example (convert → validate).
#   lang   — the LVNScript grammar contract: lvn-lang tests (incl. the
#            grammar.json ↔ grammar.js parity guard) + a regen-diff check so a
#            hand-edited generated file fails loudly.
#   panel  — the authoring panel builds (catches broken imports/aliases).
#   unity  — the engine package's 300+ EditMode tests + the PlayMode smoke via
#            game-ci, using the committed unity/TestHost project. Needs either
#            the UNITY_EMAIL + UNITY_PASSWORD secrets (Personal license — Unity
#            dropped manual .ulf activation for it) or a UNITY_LICENSE .ulf
#            (Pro). Without credentials the job emits a notice and passes, so
#            forks stay green until configured.
name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:

# Each Go module is built and tested standalone (GOWORK=off), the way a
# consumer would `go install` it — the repo's go.work is a local convenience,
# not part of the contract.
env:
  GOWORK: "off"

jobs:
  go:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [tools/lvnconv, server]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  smoke:
    name: lvnconv end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/lvnconv/go.mod
          cache-dependency-path: tools/lvnconv/go.sum
      - name: convert + validate the example
        working-directory: tools/lvnconv
        run: |
          go run . convert -i ../../examples/hello.ink -o /tmp/hello.lvn
          go run . validate /tmp/hello.lvn
          go run . probe /tmp/hello.lvn
      # The howto quality gate the docs promise: every authored example
      # compiles AND validates with zero warnings — examples can't rot.
      - name: compile-gate every authored example (howto + examples)
        working-directory: tools/lvnconv
        run: |
          go build -o /tmp/lvnconv .
          fail=0
          for f in ../../howto/*/*.lvns ../../examples/*.lvns; do
            out="/tmp/gate-$(basename "${f%.lvns}").lvn"
            if ! /tmp/lvnconv convert -i "$f" -o "$out"; then
              echo "::error file=${f#../../}::convert failed"; fail=1; continue
            fi
            v=$(/tmp/lvnconv validate "$out" 2>&1)
            echo "${f#../../}: $v"
            case "$v" in
              *" 0 warning(s)"*) ;;
              *) echo "::error file=${f#../../}::validator warnings — the gate is 0 warnings"; fail=1;;
            esac
          done
          exit $fail

  lang:
    name: LVNScript grammar contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: grammar + analysis tests
        working-directory: tools/lvn-lang
        run: node --test
      - name: generated grammar.js is in sync
        working-directory: tools/lvn-lang
        run: |
          node scripts/gen.mjs
          git diff --exit-code src/grammar.js \
            || { echo "::error::grammar.js is stale — run 'npm run gen' in tools/lvn-lang and commit"; exit 1; }
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/lvnconv/go.mod
      - name: VS Code extension assembles and answers
        working-directory: tools/vscode-lvn
        run: |
          node build.mjs
          node test-node.mjs

  panel:
    name: authoring panel builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: panel/package-lock.json
      - name: build + lint + test
        working-directory: panel
        run: |
          npm ci
          npm run build
          npm run lint
          npm test

  # Runs on the self-hosted mac runner: Unity is installed and licensed there
  # (Unity discontinued .ulf activation for Personal licenses, so the docker
  # route can't activate). Push-only + repo guard: pull requests from forks
  # must never execute on our hardware.
  unity:
    name: engine tests (EditMode + PlayMode)
    if: github.event_name == 'push' && github.repository == 'fomeanator/elvin'
    runs-on: [self-hosted, unity-mac]
    timeout-minutes: 40
    env:
      UNITY: /Applications/Unity/Hub/Editor/6000.4.5f1/Unity.app/Contents/MacOS/Unity
    steps:
      - uses: actions/checkout@v4
      - name: EditMode
        run: |
          "$UNITY" -batchmode -nographics -projectPath unity/TestHost \
            -runTests -testPlatform EditMode \
            -testResults "$PWD/test-results/editmode.xml" -logFile - | tail -20 || true
          test -s test-results/editmode.xml
      - name: PlayMode
        run: |
          "$UNITY" -batchmode -nographics -projectPath unity/TestHost \
            -runTests -testPlatform PlayMode \
            -testResults "$PWD/test-results/playmode.xml" -logFile - | tail -20 || true
          test -s test-results/playmode.xml
      - name: report
        run: |
          python3 - <<'PY'
          import glob, sys, xml.etree.ElementTree as ET
          bad = 0
          for f in sorted(glob.glob('test-results/*.xml')):
              r = ET.parse(f).getroot()
              print(f"{f}: total={r.get('total')} passed={r.get('passed')} failed={r.get('failed')}")
              for tc in r.iter('test-case'):
                  if tc.get('result') != 'Passed':
                      bad += 1
                      print('  FAIL:', tc.get('fullname'))
          sys.exit(1 if bad else 0)
          PY
      # The artifact is diagnostics, not the gate — the report step above already
      # failed the job on any red test. Uploads regularly time out on this
      # runner's flaky link to GitHub; that must not repaint a green run red.
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: unity-test-results
          path: test-results
