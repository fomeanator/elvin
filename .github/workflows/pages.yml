# The public site on GitHub Pages: the playground at the root and the docs at
# /docs/ — both fully static (the compiler is wasm; the docs viewer is a
# zero-dependency SPA). Server-backed extras (catalog art, leaderboards)
# degrade silently.
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
name: pages

on:
  push:
    branches: [main]
    paths:
      - "panel/public/**"
      - "howto/**"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'fomeanator/unity-lvn-vn-engine'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble the site
        run: |
          mkdir -p _site
          cp -r panel/public/play/* _site/          # playground at the root
          mkdir -p _site/docs
          cp panel/public/docs/*.html panel/public/docs/*.css panel/public/docs/*.js _site/docs/
          bash panel/public/docs/build-content.sh . _site/docs/content
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
