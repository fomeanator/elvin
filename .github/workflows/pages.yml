# The public playground: panel/public/play is fully static (the compiler is
# wasm in the browser), so GitHub Pages hosts it for free — the project's
# "try it right now" link. Server-backed extras (catalog art, leaderboards)
# degrade silently; write→play→share→export-HTML works entirely client-side.
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
name: pages

on:
  push:
    branches: [main]
    paths:
      - "panel/public/play/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'fomeanator/unity-lvn-vn-engine'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: panel/public/play
      - id: deployment
        uses: actions/deploy-pages@v4
