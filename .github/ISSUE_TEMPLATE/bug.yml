name: 🐞 Bug
description: Something misbehaves — in the engine, the compiler, the IDE or the playground
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Where
      options: [Unity runtime, lvnconv / language, Web IDE (panel), Playground (/play), Server / services, Docs]
    validations: { required: true }
  - type: textarea
    id: what
    attributes:
      label: What happened vs. what you expected
      description: A minimal .lvns snippet reproducing it is worth a thousand words — the playground's Share link works great here.
    validations: { required: true }
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.7.0
