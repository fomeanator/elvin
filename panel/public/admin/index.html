<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LVN — Админка</title>
<style>
  :root {
    --bg:#101015; --panel:#17171d; --card:#1c1c24; --line:#2a2a33;
    --text:#f2eee1; --dim:#9a948a; --accent:#c8a050; --accent-ink:#14141a;
    --ok:#69c07a; --bad:#e06a6a;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:15px/1.45 -apple-system,'Segoe UI',Roboto,sans-serif; }
  header { display:flex; align-items:center; gap:14px; padding:14px 20px; background:var(--panel); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  header h1 { font-size:18px; color:var(--accent); }
  header .spacer { flex:1; }
  nav { display:flex; gap:4px; padding:10px 20px 0; background:var(--panel); border-bottom:1px solid var(--line); }
  nav button { background:none; border:none; color:var(--dim); font-size:15px; padding:10px 16px; cursor:pointer; border-radius:8px 8px 0 0; }
  nav button.active { color:var(--text); background:var(--bg); border:1px solid var(--line); border-bottom-color:var(--bg); }
  main { padding:20px; max-width:1200px; margin:0 auto; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { text-align:left; color:var(--dim); font-weight:500; padding:6px 10px; border-bottom:1px solid var(--line); }
  td { padding:7px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  tr:hover td { background:#ffffff08; }
  input, select, textarea { background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; }
  textarea { width:100%; min-height:420px; font:13px/1.5 ui-monospace,Menlo,monospace; white-space:pre; }
  button.btn { background:var(--accent); color:var(--accent-ink); border:none; border-radius:8px; padding:9px 16px; font:inherit; cursor:pointer; }
  button.ghost { background:#ffffff12; color:var(--text); }
  button.danger { background:var(--bad); color:#fff; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  .pill { background:#00000066; border-radius:12px; padding:3px 10px; font-size:13px; color:var(--dim); }
  .ok { color:var(--ok); } .bad { color:var(--bad); }
  .muted { color:var(--dim); font-size:13px; }
  #login { max-width:420px; margin:80px auto; }
  pre { background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:12px; overflow:auto; font-size:12.5px; max-height:400px; }
  h2 { font-size:16px; margin-bottom:10px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:900px){ .grid{ grid-template-columns:1fr; } }
  .chapter { border:1px solid var(--line); border-radius:8px; padding:10px; margin:8px 0; background:var(--bg); }
  .chapter input { margin:2px 6px 2px 0; }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--card); border:1px solid var(--accent); border-radius:10px; padding:12px 18px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:10; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <h1>LVN Админка</h1>
  <span class="muted" id="whoami"></span>
  <div class="spacer"></div>
  <button class="btn ghost" id="logout" style="display:none">Выйти</button>
</header>

<div id="login" class="card">
  <h2>Вход</h2>
  <p class="muted" style="margin-bottom:10px">Токен администратора (флаг <code>-admin-token</code> сервера).</p>
  <div class="row">
    <input id="tok" type="password" placeholder="admin token" style="flex:1" />
    <button class="btn" id="enter">Войти</button>
  </div>
  <p class="bad" id="loginErr"></p>
</div>

<div id="app" style="display:none">
  <nav>
    <button data-tab="novel" class="active">Новелла</button>
    <button data-tab="users">Пользователи</button>
    <button data-tab="orders">Заказы</button>
    <button data-tab="saves">Сохранения</button>
    <button data-tab="analytics">Аналитика</button>
  </nav>
  <main id="main"></main>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
let TOKEN = localStorage.getItem('lvn_admin_token') || '';
let manifest = null;

const api = async (path, opt = {}) => {
  opt.headers = Object.assign({ 'Authorization': 'Bearer ' + TOKEN }, opt.headers || {});
  const r = await fetch(path, opt);
  if (r.status === 401) { logout(); throw new Error('unauthorized'); }
  if (!r.ok) throw new Error(await r.text());
  const ct = r.headers.get('content-type') || '';
  return ct.includes('json') ? r.json() : r.text();
};
const toast = msg => { const t = $('#toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); };
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = n => Number(n).toLocaleString('ru-RU');

function logout() {
  localStorage.removeItem('lvn_admin_token'); TOKEN = '';
  $('#app').style.display = 'none'; $('#login').style.display = 'block'; $('#logout').style.display = 'none';
}
async function enter() {
  TOKEN = $('#tok').value.trim();
  try {
    await api('/v1/admin/users');
    localStorage.setItem('lvn_admin_token', TOKEN);
    $('#login').style.display = 'none'; $('#app').style.display = 'block'; $('#logout').style.display = 'inline-block';
    show('novel');
  } catch (e) { $('#loginErr').textContent = 'Токен не подошёл: ' + e.message; }
}
$('#enter').onclick = enter;
$('#tok').addEventListener('keydown', e => { if (e.key === 'Enter') enter(); });
$('#logout').onclick = logout;
document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.classList.toggle('active', x === b));
  show(b.dataset.tab);
});

function show(tab) { ({novel, users, orders, saves, analytics})[tab](); }

/* ── Новелла: главы/бандлы + raw JSON ─────────────────────────────────── */
async function novel() {
  manifest = await api('/v1/admin/manifest');
  const m = $('#main');
  const titles = manifest.titles || [];
  m.innerHTML = `
    <div class="card">
      <div class="row">
        <h2 style="flex:1">Тайтлы и главы</h2>
        <button class="btn ghost" id="addTitle">+ тайтл</button>
        <button class="btn" id="saveNovel">Сохранить манифест</button>
      </div>
      <p class="muted">Правки уезжают живым клиентам в течение пары секунд (live-sync).</p>
      <div id="titles"></div>
    </div>
    <div class="card">
      <h2>Весь манифест (raw JSON)</h2>
      <p class="muted" style="margin-bottom:8px">Спрайты, гардеробы, ui-темы — всё здесь. Сохранение валидирует JSON.</p>
      <textarea id="raw"></textarea>
      <div class="row" style="margin-top:10px">
        <button class="btn" id="saveRaw">Сохранить raw</button>
        <span class="muted">осторожно: raw перезаписывает всё</span>
      </div>
    </div>`;
  $('#raw').value = JSON.stringify(manifest, null, 2);
  const box = $('#titles');
  const render = () => {
    box.innerHTML = titles.map((t, ti) => `
      <div class="chapter" style="border-color:var(--accent)">
        <div class="row">
          <b>${esc(t.name || t.id)}</b><span class="pill">${esc(t.id)}</span>
          <input value="${esc(t.name || '')}" data-t="${ti}" data-f="name" placeholder="название" />
          <button class="btn ghost" data-addch="${ti}">+ глава</button>
          <button class="btn danger" data-delt="${ti}">удалить тайтл</button>
        </div>
        ${(t.seasons || []).flatMap((s, si) => (s.chapters || []).map((c, ci) => `
          <div class="chapter">
            <input style="width:70px"  value="${c.number ?? 0}"  data-t="${ti}" data-s="${si}" data-c="${ci}" data-f="number" title="номер" />
            <input style="width:160px" value="${esc(c.id || '')}"        data-t="${ti}" data-s="${si}" data-c="${ci}" data-f="id" placeholder="id" />
            <input style="width:200px" value="${esc(c.name || '')}"      data-t="${ti}" data-s="${si}" data-c="${ci}" data-f="name" placeholder="название" />
            <input style="width:260px" value="${esc(c.script_url || '')}" data-t="${ti}" data-s="${si}" data-c="${ci}" data-f="script_url" placeholder="/content/scripts/….lvn" />
            <input style="width:240px" value="${esc(c.bg_url || '')}"     data-t="${ti}" data-s="${si}" data-c="${ci}" data-f="bg_url" placeholder="обложка (bg_url)" />
            <button class="btn danger" data-delch="${ti}:${si}:${ci}">×</button>
          </div>`)).join('')}
      </div>`).join('');
    box.querySelectorAll('input[data-f]').forEach(inp => inp.onchange = () => {
      const { t, s, c, f } = inp.dataset;
      const target = c !== undefined ? titles[t].seasons[s].chapters[c] : titles[t];
      target[f] = f === 'number' ? Number(inp.value) : inp.value;
      $('#raw').value = JSON.stringify(manifest, null, 2);
    });
    box.querySelectorAll('[data-addch]').forEach(b => b.onclick = () => {
      const t = titles[b.dataset.addch];
      t.seasons = t.seasons?.length ? t.seasons : [{ id: 's1', name: 'Season 1', chapters: [] }];
      const chs = t.seasons[0].chapters = t.seasons[0].chapters || [];
      chs.push({ id: t.id + '-ch' + (chs.length + 1), number: chs.length + 1, name: '', script_url: '' });
      render();
    });
    box.querySelectorAll('[data-delch]').forEach(b => b.onclick = () => {
      const [t, s, c] = b.dataset.delch.split(':');
      titles[t].seasons[s].chapters.splice(c, 1); render();
    });
    box.querySelectorAll('[data-delt]').forEach(b => b.onclick = () => {
      if (confirm('Удалить тайтл из манифеста? (файлы контента не трогаются)')) { titles.splice(b.dataset.delt, 1); render(); }
    });
  };
  render();
  $('#addTitle').onclick = () => {
    const id = prompt('id нового тайтла (латиницей):'); if (!id) return;
    titles.push({ id, name: id, seasons: [{ id: 's1', name: 'Season 1', chapters: [] }] });
    manifest.titles = titles; render();
  };
  $('#saveNovel').onclick = async () => {
    manifest.titles = titles;
    await api('/v1/admin/manifest', { method: 'PUT', body: JSON.stringify(manifest), headers: { 'Content-Type': 'application/json' } });
    toast('Манифест сохранён — клиенты подхватят сами');
  };
  $('#saveRaw').onclick = async () => {
    let doc;
    try { doc = JSON.parse($('#raw').value); } catch (e) { toast('JSON битый: ' + e.message); return; }
    await api('/v1/admin/manifest', { method: 'PUT', body: JSON.stringify(doc), headers: { 'Content-Type': 'application/json' } });
    manifest = doc; toast('Манифест сохранён'); novel();
  };
}

/* ── Пользователи ─────────────────────────────────────────────────────── */
async function users() {
  const { users } = await api('/v1/admin/users');
  $('#main').innerHTML = `
    <div class="card">
      <h2>Пользователи (${users.length})</h2>
      <table><tr><th>id</th><th>имя</th><th>создан</th><th>провайдеры</th><th>балансы</th><th></th></tr>
      ${users.map(u => `<tr>
        <td><code>${esc(u.user_id)}</code></td>
        <td>${esc(u.name || '—')}</td>
        <td class="muted">${esc((u.created || '').slice(0, 16).replace('T', ' '))}</td>
        <td>${Object.keys(u.providers || {}).map(p => `<span class="pill">${esc(p)}</span>`).join(' ') || '<span class="muted">device</span>'}</td>
        <td>${Object.entries(u.balances || {}).map(([c, v]) => `<span class="pill">${fmt(v)} ${esc(c)}</span>`).join(' ')}</td>
        <td><button class="btn ghost" data-u="${esc(u.user_id)}">детали</button></td>
      </tr>`).join('')}</table>
    </div>
    <div id="detail"></div>`;
  document.querySelectorAll('[data-u]').forEach(b => b.onclick = () => userDetail(b.dataset.u));
}
async function userDetail(id) {
  const d = await api('/v1/admin/users/' + id);
  $('#detail').innerHTML = `
    <div class="card">
      <h2>${esc(id)} ${d.name ? '· ' + esc(d.name) : ''}</h2>
      <div class="row">
        <input id="gcur" placeholder="валюта (gold)" style="width:140px" />
        <input id="gamt" placeholder="±количество" type="number" style="width:140px" />
        <input id="grsn" placeholder="причина (audit)" style="width:220px" />
        <button class="btn" id="grant">Начислить / списать</button>
      </div>
      <div class="grid">
        <div><h2>Кошелёк</h2><pre>${esc(JSON.stringify({ balances: d.wallet.balances, inventory: d.wallet.inventory }, null, 2))}</pre></div>
        <div><h2>История</h2><pre>${esc(JSON.stringify((d.wallet.history || []).slice(-25).reverse(), null, 2))}</pre></div>
      </div>
    </div>`;
  $('#grant').onclick = async () => {
    const body = { user_id: id, currency: $('#gcur').value.trim(), amount: Number($('#gamt').value), reason: $('#grsn').value.trim() || 'admin:panel' };
    if (!body.currency || !body.amount) { toast('нужны валюта и количество'); return; }
    await api('/v1/admin/grant', { method: 'POST', body: JSON.stringify(body) });
    toast('Готово'); userDetail(id);
  };
}

/* ── Заказы ───────────────────────────────────────────────────────────── */
async function orders() {
  const { orders } = await api('/v1/admin/orders');
  $('#main').innerHTML = `
    <div class="card">
      <h2>Заказы — покупки паков и внутриигровые траты со sku (${(orders || []).length})</h2>
      <table><tr><th>время</th><th>юзер</th><th>тип</th><th>sku</th><th>сумма</th><th>причина</th></tr>
      ${(orders || []).map(o => `<tr>
        <td class="muted">${esc((o.ts || '').slice(0, 19).replace('T', ' '))}</td>
        <td><code>${esc(o.user_id)}</code></td>
        <td>${o.type === 'iap' ? '<span class="ok">IAP</span>' : 'spend'}</td>
        <td>${esc(o.sku || '')}</td>
        <td>${fmt(o.amount || 0)} ${esc(o.currency || '')}</td>
        <td class="muted">${esc(o.reason || '')}</td>
      </tr>`).join('')}</table>
    </div>`;
}

/* ── Сохранения ───────────────────────────────────────────────────────── */
async function saves() {
  const { saves } = await api('/v1/admin/saves');
  $('#main').innerHTML = `
    <div class="card">
      <h2>Облачные сохранения (${(saves || []).length})</h2>
      <table><tr><th>ключ (user__title)</th><th>размер</th><th>обновлён</th><th></th></tr>
      ${(saves || []).map(s => `<tr>
        <td><code>${esc(s.key)}</code></td>
        <td class="muted">${fmt(s.size)} b</td>
        <td class="muted">${esc((s.modified || '').slice(0, 19).replace('T', ' '))}</td>
        <td>
          <button class="btn ghost" data-view="${esc(s.key)}">смотреть</button>
          <button class="btn danger" data-del="${esc(s.key)}">удалить</button>
        </td>
      </tr>`).join('')}</table>
    </div>
    <div id="saveview"></div>`;
  document.querySelectorAll('[data-view]').forEach(b => b.onclick = async () => {
    const body = await api('/v1/admin/saves/' + b.dataset.view);
    $('#saveview').innerHTML = `<div class="card"><h2>${esc(b.dataset.view)}</h2><pre>${esc(JSON.stringify(body, null, 2))}</pre></div>`;
  });
  document.querySelectorAll('[data-del]').forEach(b => b.onclick = async () => {
    if (!confirm('Удалить сохранение ' + b.dataset.del + '? Это необратимо.')) return;
    await api('/v1/admin/saves/' + b.dataset.del, { method: 'DELETE' });
    toast('Удалено'); saves();
  });
}

/* ── Аналитика ────────────────────────────────────────────────────────── */
async function analytics(day) {
  day = day || new Date().toISOString().slice(0, 10);
  const d = await api('/v1/analytics/summary?day=' + day);
  const names = Object.entries(d.by_name || {}).sort((a, b) => b[1] - a[1]);
  const max = names.length ? names[0][1] : 1;
  $('#main').innerHTML = `
    <div class="card">
      <div class="row">
        <h2 style="flex:1">Аналитика за <input type="date" id="day" value="${day}" /></h2>
        <span class="pill">событий: ${fmt(d.total)}</span>
        <span class="pill">уникальных: ${fmt(d.unique_users)}</span>
      </div>
      <table><tr><th>событие</th><th style="width:60%"></th><th>число</th></tr>
      ${names.map(([n, v]) => `<tr>
        <td>${esc(n)}</td>
        <td><div style="height:10px;border-radius:5px;background:var(--accent);width:${Math.max(2, v / max * 100)}%"></div></td>
        <td>${fmt(v)}</td>
      </tr>`).join('')}</table>
    </div>`;
  $('#day').onchange = e => analytics(e.target.value);
}

/* boot */
if (TOKEN) enter(); else $('#tok').focus();
if (TOKEN) $('#tok').value = TOKEN;
</script>
</body>
</html>
